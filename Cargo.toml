[workspace]
resolver = "2"
members = ["crates/magequery-core", "crates/magequery-cli"]

[workspace.package]
version = "0.0.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/pingiun/magequery"

[workspace.dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
quick-xml = "0.36"
