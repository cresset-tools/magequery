id = "magequery"
name = "magequery"
description = "Magento 2 wiring answers from magequery: doctor diagnostics, go-to-definition and hover in di.xml/events.xml, reverse-DI references."
version = "0.1.0"
schema_version = 1
authors = ["Jelle Besseling <jelle@pingiun.com>"]
repository = "https://github.com/cresset-tools/magequery"

# Zed attaches language servers per language: magequery runs alongside the language's
# primary server (Intelephense for PHP), answering the XML config layer it can't see.
# The PHP and XML language extensions must be installed for these names to resolve.
[language_servers.magequery]
name = "magequery"
languages = ["PHP", "XML"]
